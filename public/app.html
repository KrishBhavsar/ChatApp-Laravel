<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Chat</title>
<!-- Real-time: Pusher client + Laravel Echo (loaded from CDN) -->
<script src="https://js.pusher.com/8.4.0/pusher.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/laravel-echo@1.16.1/dist/echo.iife.js"></script>
<style>
  :root{
    --bg:#0b0e14; --sidebar:#12151f; --panel:#161a25; --panel2:#1d2230;
    --border:#262b3a; --text:#e8eaf0; --muted:#8b93a7;
    --accent:#6366f1; --accent2:#818cf8; --me:#4f46e5; --them:#232838;
    --green:#22c55e; --red:#ef4444;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--text); font-size:14.5px; overflow:hidden;
    -webkit-text-size-adjust:100%;
  }
  /* use the dynamic viewport height on mobile so the address bar doesn't crop the UI */
  @supports (height:100dvh){
    #login{height:100dvh}
    #app{height:100dvh}
  }
  button{font-family:inherit;cursor:pointer}
  input,textarea{font-family:inherit}

  /* ---------- LOGIN ---------- */
  #login{
    height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    background:radial-gradient(1200px 600px at 50% -10%,rgba(99,102,241,.18),transparent);
  }
  .login-card{
    width:100%;max-width:400px;background:var(--panel);border:1px solid var(--border);
    border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  @media(max-width:420px){
    #login{padding:14px}
    .login-card{padding:24px 20px;border-radius:14px}
    .login-card h1{font-size:20px}
  }
  /* Short / landscape viewports: let the login card scroll instead of clipping,
     and tighten its vertical rhythm so it fits under the fold. */
  @media(max-height:560px){
    #login{align-items:flex-start;overflow-y:auto;padding-top:16px;padding-bottom:16px}
    .login-card{padding:20px}
    .login-card .sub{margin-bottom:16px}
    .tabs{margin-bottom:14px}
    .field{margin-bottom:10px}
  }
  .login-card h1{font-size:22px;margin-bottom:4px;display:flex;align-items:center;gap:10px}
  .login-card .sub{color:var(--muted);font-size:13px;margin-bottom:24px}
  .tabs{display:flex;gap:4px;background:var(--panel2);padding:4px;border-radius:10px;margin-bottom:20px}
  .tabs button{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);border-radius:7px;font-weight:600;font-size:13px}
  .tabs button.on{background:var(--accent);color:#fff}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
  .field input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:11px 13px;border-radius:9px;font-size:14px;outline:none}
  .field input:focus{border-color:var(--accent)}
  .btn-primary{width:100%;background:var(--accent);color:#fff;border:none;padding:12px;border-radius:9px;font-weight:600;font-size:14px;margin-top:6px}
  .btn-primary:hover{background:var(--accent2)}
  .btn-primary:disabled{opacity:.6}
  .err{color:var(--red);font-size:12.5px;margin-top:12px;min-height:16px}
  .hint{color:var(--muted);font-size:11.5px;margin-top:14px;line-height:1.6}
  .hidden{display:none!important}

  /* ---------- APP SHELL ---------- */
  /* Desktop: fixed sidebar + fluid chat. Widens on large screens, narrows on tablets. */
  #app{height:100vh;display:grid;grid-template-columns:320px 1fr}
  @media(min-width:1400px){#app{grid-template-columns:380px 1fr}}
  @media(max-width:960px){#app{grid-template-columns:280px 1fr}}
  /* Mid-tablet (768–960px): both columns stay visible but the sidebar is tight,
     so trim its horizontal padding and cap message width for a roomier chat. */
  @media(min-width:768px) and (max-width:960px){
    .me{padding:14px 12px}
    .search{padding:10px 12px}
    #searchResults{left:12px;right:12px}
    .list-title{padding:10px 12px 6px}
    .contact{padding:11px 12px}
    .chat-head{padding:12px 14px}
    .messages{padding:16px}
    .msg{max-width:78%}
    .composer{padding:12px 14px}
  }
  /* Phones/small tablets: single column — swap between list and chat views. */
  @media(max-width:720px){
    #app{grid-template-columns:1fr}
    #app.show-chat .sidebar{display:none}
    #app:not(.show-chat) .chat{display:none}
  }

  .sidebar{background:var(--sidebar);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0}
  .me{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
  .me .info{flex:1;min-width:0}
  .me .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .me .email{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .icon-btn{background:transparent;border:none;color:var(--muted);padding:6px;border-radius:6px;font-size:16px}
  .icon-btn:hover{background:var(--panel2);color:var(--text)}

  .search{padding:12px 16px;border-bottom:1px solid var(--border)}
  .search input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:9px 12px;border-radius:8px;outline:none;font-size:13.5px}
  #searchResults{position:absolute;top:calc(100% + 4px);left:16px;right:16px;background:var(--panel);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 32px rgba(0,0,0,.5);z-index:50;max-height:min(280px,50vh);overflow-y:auto}
  .sresult{display:flex;align-items:center;gap:10px;padding:10px 12px;cursor:pointer}
  .sresult:hover{background:var(--panel2)}
  .sresult .info{flex:1;min-width:0}
  .sresult .rn{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sresult .re{color:var(--muted);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sresult-empty{padding:14px 12px;color:var(--muted);font-size:12.5px;text-align:center}
  .list-title{padding:12px 16px 6px;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
  .contacts{flex:1;overflow-y:auto;min-height:0}
  .contact{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-left:3px solid transparent}
  .contact:hover{background:var(--panel2)}
  .contact.active{background:var(--panel2);border-left-color:var(--accent)}
  .contact .info{flex:1;min-width:0}
  .contact .cname{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .contact .preview{color:var(--muted);font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
  .unread{background:var(--accent);color:#fff;font-size:11px;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px}
  .contacts-empty{padding:24px 16px;color:var(--muted);font-size:13px;text-align:center;line-height:1.7}

  /* ---------- CHAT ---------- */
  .chat{display:flex;flex-direction:column;min-height:0;background:
    linear-gradient(rgba(11,14,20,.96),rgba(11,14,20,.96));}
  .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:12px}
  .chat-empty .big{font-size:48px;opacity:.4}
  .chat-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--panel)}
  .chat-head .back{display:none}
  @media(max-width:720px){.chat-head .back{display:block}}
  .chat-head .cname{font-weight:600}
  .chat-head .status{color:var(--muted);font-size:12px}
  .chat-head .spacer{flex:1}
  .messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:8px;min-height:0}
  .msg{max-width:min(72%,520px);padding:9px 13px;border-radius:14px;font-size:14px;line-height:1.45;word-wrap:break-word;overflow-wrap:anywhere;position:relative}
  .msg .t{font-size:10.5px;opacity:.6;margin-top:4px;text-align:right}
  .msg.them{background:var(--them);align-self:flex-start;border-bottom-left-radius:4px}
  .msg.me{background:var(--me);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .msg .tick{margin-left:6px}
  .day-sep{align-self:center;background:var(--panel2);color:var(--muted);font-size:11px;padding:4px 12px;border-radius:12px;margin:8px 0}
  .composer{padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end;background:var(--panel)}
  .composer textarea{flex:1;background:var(--panel2);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px 14px;resize:none;max-height:120px;outline:none;font-size:14px;line-height:1.4}
  .composer textarea:focus{border-color:var(--accent)}
  .send-btn{background:var(--accent);border:none;color:#fff;width:44px;height:44px;border-radius:50%;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .send-btn:hover{background:var(--accent2)}
  .send-btn:disabled{opacity:.5}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--red);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,.4)}
  .adminbar{padding:8px 16px;font-size:12px;color:var(--muted);border-top:1px solid var(--border)}
  .adminbar a{color:var(--accent2);cursor:pointer}

  /* Keep the top-of-sidebar clear of notches on phones in single-column mode */
  @media(max-width:720px){
    .sidebar .me{padding-top:calc(16px + env(safe-area-inset-top))}
    .chat-head{padding-top:calc(14px + env(safe-area-inset-top))}
    .msg{max-width:85%}
    .messages{padding:14px}
    .chat-head{padding-left:14px;padding-right:14px}
    .composer{padding-left:12px;padding-right:12px}
  }
  @media(max-width:400px){
    body{font-size:14px}
    .messages{padding:12px 10px}
    .msg{max-width:88%;font-size:13.5px}
    .me{padding:12px}
    .search{padding:10px 12px}
    .contact{padding:10px 12px}
    .send-btn{width:42px;height:42px}
  }
  /* On coarse-pointer (touch) devices give tap targets a little more room */
  @media(pointer:coarse){
    .icon-btn{padding:8px}
    .contact{padding-top:13px;padding-bottom:13px}
  }

  /* ---------- VOICE CALL ---------- */
  /* Round call button in the chat header */
  .call-btn{background:transparent;border:none;color:var(--muted);padding:8px;border-radius:8px;font-size:18px;line-height:1}
  .call-btn:hover{background:var(--panel2);color:var(--green)}
  .call-btn:disabled{opacity:.4;cursor:not-allowed}

  /* Full-screen dim behind any call surface */
  .call-overlay{position:fixed;inset:0;background:rgba(6,8,13,.72);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
  .call-card{width:100%;max-width:340px;background:var(--panel);border:1px solid var(--border);border-radius:20px;padding:32px 28px;box-shadow:0 24px 70px rgba(0,0,0,.55);text-align:center}
  .call-card .call-avatar{width:88px;height:88px;border-radius:50%;margin:0 auto 18px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:32px;color:#fff}
  .call-card .call-name{font-size:19px;font-weight:600;margin-bottom:4px}
  .call-card .call-state{color:var(--muted);font-size:13.5px;margin-bottom:24px;min-height:18px}
  .call-actions{display:flex;gap:16px;justify-content:center}
  .call-round{width:60px;height:60px;border-radius:50%;border:none;color:#fff;font-size:24px;display:flex;align-items:center;justify-content:center}
  .call-accept{background:var(--green)}.call-accept:hover{filter:brightness(1.1)}
  .call-decline,.call-hangup{background:var(--red)}.call-decline:hover,.call-hangup:hover{filter:brightness(1.1)}
  .call-mute{background:var(--panel2);color:var(--text)}.call-mute.on{background:var(--accent);color:#fff}
  .call-action-label{font-size:11px;color:var(--muted);margin-top:6px}
  .call-action{display:flex;flex-direction:column;align-items:center}
  /* subtle pulse for the ringing avatar */
  @keyframes callpulse{0%{box-shadow:0 0 0 0 rgba(99,102,241,.5)}70%{box-shadow:0 0 0 18px rgba(99,102,241,0)}100%{box-shadow:0 0 0 0 rgba(99,102,241,0)}}
  .call-card.ringing .call-avatar{animation:callpulse 1.6s infinite}

  /* Video-call stage: remote fills the screen, local is a small self-view (PiP). */
  .video-stage{position:fixed;inset:0;background:#05070c;z-index:190;display:none}
  .video-stage.on{display:block}
  #remoteVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;background:#05070c}
  #localVideo{position:absolute;right:16px;bottom:calc(120px + env(safe-area-inset-bottom));width:118px;height:158px;object-fit:cover;border-radius:14px;border:2px solid rgba(255,255,255,.35);box-shadow:0 8px 24px rgba(0,0,0,.5);background:#11141f;z-index:2;transform:scaleX(-1)}
  /* while still connecting there's no remote frame yet — show the peer name over black */
  .video-hint{position:absolute;top:0;left:0;right:0;padding:calc(18px + env(safe-area-inset-top)) 18px 18px;color:#fff;z-index:2;text-align:center;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.6)}
  .video-hint .vn{font-size:18px;font-weight:600}
  .video-hint .vs{font-size:13px;opacity:.85;margin-top:2px}
  /* control bar pinned to the bottom of the video stage */
  .video-controls{position:absolute;left:0;right:0;bottom:0;padding:20px 18px calc(28px + env(safe-area-inset-bottom));display:flex;gap:18px;justify-content:center;z-index:3;background:linear-gradient(transparent,rgba(0,0,0,.55))}
  @media(max-width:720px){#localVideo{width:96px;height:128px;right:12px}}
  /* Landscape / short screens: shrink the call card + avatar so accept/decline
     stay on-screen, and lift the video self-view above the shorter control bar. */
  @media(max-height:560px){
    .call-card{padding:20px 22px}
    .call-card .call-avatar{width:64px;height:64px;font-size:24px;margin-bottom:12px}
    .call-card .call-state{margin-bottom:16px}
    .call-round{width:52px;height:52px;font-size:20px}
    .video-controls{padding:12px 18px calc(14px + env(safe-area-inset-bottom))}
    #localVideo{width:84px;height:112px;bottom:calc(84px + env(safe-area-inset-bottom))}
  }
</style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login">
  <div class="login-card">
    <h1>💬 Chat</h1>
    <div class="sub">Sign in to start messaging</div>
    <div class="tabs">
      <button id="tabLogin" class="on" onclick="switchTab('login')">Login</button>
      <button id="tabReg" onclick="switchTab('register')">Register</button>
    </div>

    <div id="regFields" class="hidden">
      <div class="field"><label>Name</label><input id="i_name" placeholder="At least 5 characters"></div>
      <div class="field"><label>Phone number</label><input id="i_phone" placeholder="10–15 digits"></div>
    </div>
    <div class="field"><label>Email</label><input id="i_email" type="email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input id="i_password" type="password" placeholder="Your password"></div>

    <button class="btn-primary" id="submitBtn" onclick="submitAuth()">Login</button>
    <div class="err" id="loginErr"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" class="hidden">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="me">
      <div class="avatar" id="meAvatar"></div>
      <div class="info">
        <div class="name" id="meName"></div>
        <div class="email" id="meEmail"></div>
      </div>
      <button class="icon-btn" title="Logout" onclick="logout()">⏻</button>
    </div>
    <div class="search" style="position:relative">
      <input id="newChat" placeholder="Search users by name…" autocomplete="off"
             oninput="onSearchInput()" onkeydown="if(event.key==='Escape')clearSearch()">
      <div id="searchResults" class="hidden"></div>
    </div>
    <div class="list-title"><span>Conversations</span><button class="icon-btn" title="Refresh" onclick="loadContacts()">↻</button></div>
    <div class="contacts" id="contacts"></div>
    <div class="adminbar hidden" id="adminbar">👑 Admin — <a onclick="showAllChats()">view all chats</a></div>
  </div>

  <!-- CHAT -->
  <div class="chat">
    <div class="chat-empty" id="chatEmpty">
      <div class="big">💬</div>
      <div>Select a conversation to start messaging</div>
      <div style="font-size:12.5px">or search a user by name to start a new chat</div>
    </div>

    <div id="chatView" class="hidden" style="display:flex;flex-direction:column;height:100%;min-height:0">
      <div class="chat-head">
        <button class="icon-btn back" onclick="backToList()">←</button>
        <div class="avatar" id="peerAvatar" style="width:38px;height:38px;font-size:14px"></div>
        <div>
          <div class="cname" id="peerName"></div>
          <div class="status" id="peerStatus">🟢 live</div>
        </div>
        <div class="spacer"></div>
        <button class="call-btn" id="callBtn" title="Voice call" onclick="startCall('audio')">📞</button>
        <button class="call-btn" id="videoBtn" title="Video call" onclick="startCall('video')">🎥</button>
      </div>
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="composer" rows="1" placeholder="Type a message…" onkeydown="composerKey(event)" oninput="autogrow(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<!-- ================= VOICE CALL UI ================= -->
<!-- Remote audio (the other person's voice) plays here. Hidden, autoplays. -->
<audio id="remoteAudio" autoplay playsinline></audio>

<div id="callOverlay" class="call-overlay hidden">
  <div class="call-card" id="callCard">
    <div class="call-avatar" id="callAvatar"></div>
    <div class="call-name" id="callName"></div>
    <div class="call-state" id="callState"></div>
    <div class="call-actions" id="callActions"></div>
  </div>
</div>

<!-- Full-screen video stage (used only for video calls that are connecting/live) -->
<div id="videoStage" class="video-stage">
  <video id="remoteVideo" autoplay playsinline></video>
  <video id="localVideo" autoplay playsinline muted></video>
  <div class="video-hint" id="videoHint">
    <div class="vn" id="videoName"></div>
    <div class="vs" id="videoState"></div>
  </div>
  <div class="video-controls" id="videoControls"></div>
</div>

<script>
const API = location.origin + '/api';

// ---- Real-time (Pusher) config ----
// Swap these for your own Pusher app keys, or point at a local Reverb server.
const PUSHER = {
  key:     '55dfc25ef098d54d8f73',   // public app key (safe to expose)
  cluster: 'ap2',
  forceTLS: true,
};

let TOKEN = localStorage.getItem('chat_token') || '';
let ME    = JSON.parse(localStorage.getItem('chat_me') || 'null');
let PEER  = null;          // {id,name,email}
let peerCache = {};        // id -> user
let echo = null;           // Laravel Echo instance
let currentChannel = null; // name of the private channel we're subscribed to
let lastCount = 0;
let authMode = 'login';

const COLORS = ['#6366f1','#ec4899','#f59e0b','#10b981','#06b6d4','#8b5cf6','#ef4444','#14b8a6'];
const colorFor = id => COLORS[Math.abs(Number(id)||0) % COLORS.length];
const initials = n => (n||'?').split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const esc = s => (s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

// ---------- API helper ----------
async function api(method, path, body){
  const headers = {'Accept':'application/json'};
  if(body) headers['Content-Type']='application/json';
  if(TOKEN) headers['Authorization']='Bearer '+TOKEN;
  const res = await fetch(API+path,{method,headers,body:body?JSON.stringify(body):undefined});
  let json=null; try{ json = await res.json(); }catch{}
  return {ok:res.ok, status:res.status, json};
}
function toast(msg){
  const t=document.createElement('div'); t.className='toast'; t.textContent=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3200);
}

// ---------- Auth ----------
function switchTab(m){
  authMode=m;
  document.getElementById('tabLogin').classList.toggle('on',m==='login');
  document.getElementById('tabReg').classList.toggle('on',m==='register');
  document.getElementById('regFields').classList.toggle('hidden',m!=='register');
  document.getElementById('submitBtn').textContent = m==='login'?'Login':'Create account';
  document.getElementById('loginErr').textContent='';
}
async function submitAuth(){
  const err=document.getElementById('loginErr'); err.textContent='';
  const btn=document.getElementById('submitBtn'); btn.disabled=true;
  const email=v('i_email'), password=v('i_password');
  try{
    if(authMode==='register'){
      const r=await api('POST','/register',{name:v('i_name'),email,password,phone_number:v('i_phone')});
      if(!r.ok){ err.textContent=firstError(r.json); btn.disabled=false; return; }
      // auto-login after register
    }
    const r=await api('POST','/login',{email,password});
    if(!r.ok || !r.json?.message?.token){ err.textContent=firstError(r.json)||'Login failed'; btn.disabled=false; return; }
    TOKEN=r.json.message.token; ME=r.json.message.user;
    localStorage.setItem('chat_token',TOKEN); localStorage.setItem('chat_me',JSON.stringify(ME));
    enterApp();

}
function firstError(j){
  if(!j) return '';
  if(j.errors) return Object.values(j.errors)[0][0];
  if(typeof j.message==='string') return j.message;

}

async function loadHistory(scroll){
  if(!PEER) return;
  const r=await api('GET',`/chat/history/${ME.id}/${PEER.id}`);
  if(!r.ok){
    if(r.status===401){ toast('Session expired'); logout(); return; }
    document.getElementById('messages').innerHTML='<div class="chat-empty" style="flex:1"><div>Could not load messages.</div><div style="font-size:12px">'+esc(firstError(r.json))+'</div></div>';
    return;
  }
  const msgs=r.json?.data||[];
  // learn peer's real name from the payload
  const sample=msgs.find(m=>m.sender&&m.sender.sender_id===PEER.id)||msgs.find(m=>m.receiver&&m.receiver.receiver_id===PEER.id);
  if(sample){
    const p = sample.sender?.sender_id===PEER.id ? sample.sender : sample.receiver;
    const realName = p.name;
    if(realName && realName!==PEER.name){
      PEER.name=realName; peerCache[PEER.id]={id:PEER.id,name:realName,email:p.email};
      document.getElementById('peerName').textContent=realName;
      document.getElementById('peerAvatar').textContent=initials(realName);
    }
  }
  if(msgs.length===lastCount && !scroll) return; // nothing new
  lastCount=msgs.length;
  renderMessages(msgs, scroll);
}
function renderMessages(msgs, scroll){
  const box=document.getElementById('messages');
  const atBottom = box.scrollHeight-box.scrollTop-box.clientHeight < 80;
  if(!msgs.length){ box.innerHTML='<div class="chat-empty" style="flex:1"><div>No messages yet — say hi 👋</div></div>'; return; }
  let html=''; let lastDay='';
  msgs.forEach(m=>{
    const d=new Date(m.created_at||m.sent_at);
    const day=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
    if(day!==lastDay){ html+=`<div class="day-sep">${day}</div>`; lastDay=day; }
    const mine=m.sender_id===ME.id;
    const time=d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
    const tick=mine?`<span class="tick">${m.is_read?'✓✓':'✓'}</span>`:'';
    const attach = m.attachment_url?`<div style="font-size:12px;opacity:.85;margin-bottom:4px">📎 <a href="${esc(m.attachment_url)}" target="_blank" style="color:inherit">${esc(m.attachment_url)}</a></div>`:'';
    const typeTag = (m.message_type&&m.message_type!=='text')?`<span style="font-size:10px;opacity:.7;text-transform:uppercase">[${m.message_type}] </span>`:'';
    html+=`<div class="msg ${mine?'me':'them'}">${attach}${typeTag}${esc(m.message_text)}<div class="t">${time}${tick}</div></div>`;
  });
  box.innerHTML=html;
  if(scroll||atBottom) box.scrollTop=box.scrollHeight;
}

// ---------- Real-time (Pusher / Laravel Echo) ----------
// Build the Echo instance once. The custom authorizer is REQUIRED because our
// /broadcasting/auth route is protected by auth:sanctum — Pusher must send our
// Bearer token when it asks Laravel for permission to join a private channel.
function initEcho(){
  if(echo) return echo;
  echo = new Echo({
    broadcaster: 'pusher',
    key: PUSHER.key,
    cluster: PUSHER.cluster,
    forceTLS: PUSHER.forceTLS,
    authorizer: (channel) => ({
      authorize: (socketId, callback) => {
        // The broadcast-auth route lives at the app root (NOT under /api),
        // and needs our Bearer token, so we call fetch() directly here.
        fetch(location.origin + '/broadcasting/auth', {
          method:'POST',
          headers:{
            'Content-Type':'application/json',
            'Accept':'application/json',
            'Authorization':'Bearer '+TOKEN,
          },
          body: JSON.stringify({ socket_id: socketId, channel_name: channel.name }),
        })
        .then(res => res.ok ? res.json() : Promise.reject(res))
        .then(data => callback(null, data))
        .catch(err => callback(err, null));
      }
    }),
  });

  // ---- Connection diagnostics (watch these in the Console) ----
  const pc = echo.connector.pusher.connection;
  pc.bind('connecting', () => console.log('%c[Pusher] connecting…','color:#f59e0b'));
  pc.bind('connected',  () => console.log('%c[Pusher] ✅ CONNECTED (socket '+pc.socket_id+')','color:#22c55e;font-weight:bold'));
  pc.bind('unavailable',() => console.warn('[Pusher] ⚠️ unavailable — check key/cluster/internet'));
  pc.bind('failed',     () => console.error('[Pusher] ❌ failed — browser cannot use WebSockets'));
  pc.bind('disconnected',()=> console.warn('[Pusher] disconnected'));
  pc.bind('error', (e) => console.error('[Pusher] error', e));

  return echo;
}

// Subscribe to the private channel for the ME<->PEER conversation.
// Channel name uses the SAME min/max trick as the backend broadcastOn().
function subscribeToPeer(){
  if(!PEER || !TOKEN) return;
  initEcho();
  const name = `chat-${Math.min(ME.id,PEER.id)}-${Math.max(ME.id,PEER.id)}`;
  if(currentChannel === name) return;   // already listening
  unsubscribe();                        // leave any previous chat's channel
  currentChannel = name;
  console.log('%c[Echo] subscribing to private-'+name,'color:#818cf8');
  const ch = echo.private(name);
  // Pusher fires this once the /broadcasting/auth handshake succeeds and we've joined:
  ch.subscribed(() => console.log('%c[Echo] ✅ JOINED private-'+name+' — now listening','color:#22c55e;font-weight:bold'));
  ch.listen('.message.sent', (data) => {
      console.log('%c[Echo] 📩 message.sent received:','color:#22c55e', data);
      // A new message hit this conversation. The broadcast payload's id can be
      // unreliable (message_id vs id on the backend), so just re-pull history —
      // it's one request, only when something actually arrives (not every 2s).
      loadHistory(true);
      loadContacts();
    })
    .error((e) => {
      // Usually a 403 from /broadcasting/auth (not a participant) or bad keys.
      document.getElementById('peerStatus').textContent = '⚠️ live connection failed';
      console.error('[Echo] ❌ channel error (likely 403 from /broadcasting/auth or bad keys)', e);
    });
}
function unsubscribe(){
  if(echo && currentChannel){ echo.leave(currentChannel); }
  currentChannel = null;
}

// My personal channel — subscribed once at login and kept for the whole session.
// It receives EVERY message involving me, so a brand-new conversation from someone
// I've never talked to still shows up live (no refresh needed).
function subscribeToMe(){
  if(!ME || !TOKEN) return;
  initEcho();
  const name = `chat-user.${ME.id}`;
  console.log('%c[Echo] subscribing to personal channel private-'+name,'color:#818cf8');
  const ch = echo.private(name);
  ch.subscribed(() => console.log('%c[Echo] ✅ JOINED personal '+name,'color:#22c55e;font-weight:bold'));
  ch.listen('.message.sent', (data) => {
      console.log('%c[Echo] 🔔 personal event:','color:#22c55e', data);
      // Always refresh the sidebar so new/updated conversations appear.
      loadContacts();
      // If the message belongs to the chat I currently have open, refresh it too.
      if(PEER && data && (data.sender_id===PEER.id || data.receiver_id===PEER.id)){
        loadHistory(true);
      }
    })
    // Voice-call signaling arrives on this same personal channel.
    .listen('.call.signal', (data) => {
      console.log('%c[Echo] 📞 call.signal:','color:#22c55e', data && data.type, data);
      onCallSignal(data);
    })
    .error((e) => console.error('[Echo] ❌ personal channel error', e));
}
window.addEventListener('beforeunload', unsubscribe);

// ==========================================================================
//  VOICE CALLING (WebRTC, peer-to-peer, STUN-only)
// --------------------------------------------------------------------------
//  Audio flows directly browser<->browser. The server only relays the small
//  "signaling" blobs (offer / answer / ICE candidates / hangup) over the same
//  Pusher personal channel used for chat. No media ever touches the backend.
//
//  Call lifecycle (states):
//    idle       -> no call
//    calling    -> I dialed, waiting for the other side to answer
//    ringing    -> someone is calling me, I haven't accepted yet
//    connecting -> accepted; ICE is negotiating a path
//    in-call    -> audio connected
// ==========================================================================

// Free public STUN servers (Google). STUN only discovers our public address;
// it does NOT relay audio, so it stays free. Add a TURN entry here later if you
// need calls to survive strict mobile/corporate NATs.
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
];

const call = {
  state: 'idle',      // idle | calling | ringing | connecting | in-call
  kind: 'audio',      // audio | video
  peerId: null,       // the OTHER user's id
  peerName: '',       // the OTHER user's name (for the modal)
  pc: null,           // RTCPeerConnection
  localStream: null,  // our microphone (+ camera for video calls)
  muted: false,
  camOff: false,      // video calls: is our camera turned off?
  timerId: null,
  startedAt: 0,
  // ICE candidates that arrive before the remote description is set must be
  // buffered, else addIceCandidate() throws.
  pendingIce: [],
};

// ---- send a signaling blob to the other user via the backend relay ----
async function sendSignal(type, toId, payload){
  const r = await api('POST','/chat/call-signal',{ to_id: toId, type, payload: payload||null });
  if(!r.ok) console.error('[call] signal send failed', type, r.status, r.json);
  return r.ok;
}x

// ---- SDP encode/decode (gzip + base64) ----
// Two problems solved here:
//  1) The SDP is a multi-line CRLF string — raw JSON round-tripping can mangle
//     the newlines ("Invalid SDP line"). Encoding to opaque bytes avoids that.
//  2) A VIDEO offer SDP is large and Pusher rejects any event over 10 KB.
//     So we GZIP the SDP first (compresses ~5-8x) before base64 — a video offer
//     then fits comfortably under the limit. Uses the browser-native
//     CompressionStream (Chrome/Edge/Safari/Firefox all support it).
async function gzip(str){
  const cs = new CompressionStream('gzip');
  const blob = await new Response(
    new Blob([new TextEncoder().encode(str)]).stream().pipeThrough(cs)
  ).blob();
  const bytes = new Uint8Array(await blob.arrayBuffer());
  // base64 of the compressed bytes (chunked to avoid arg-length limits)
  let bin = '';
  for(let i=0;i<bytes.length;i+=0x8000){ bin += String.fromCharCode.apply(null, bytes.subarray(i,i+0x8000)); }
  return btoa(bin);
}
async function gunzip(b64){
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++){ bytes[i] = bin.charCodeAt(i); }
  const ds = new DecompressionStream('gzip');
  const blob = await new Response(new Blob([bytes]).stream().pipeThrough(ds)).blob();
  return await blob.text();
}
async function packSdp(desc){
  return { type: desc.type, gz: await gzip(desc.sdp) };
}
async function unpackSdp(obj){
  return new RTCSessionDescription({ type: obj.type, sdp: await gunzip(obj.gz) });
}

// ---- build the RTCPeerConnection and wire its event handlers ----
function makePeerConnection(otherId){
  const pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  // Our locally-discovered network paths -> ship each to the other side.
  pc.onicecandidate = (e) => {
    if(e.candidate){ sendSignal('ice', otherId, { candidate: e.candidate }); }
  };

  // The other person's media arrived -> play it. For a video call the remote
  // stream carries BOTH audio and video, so we attach it to the <video> element
  // (which plays its own audio) and leave remoteAudio empty to avoid echo.
  pc.ontrack = (e) => {
    console.log('%c[call] 🔊 remote '+e.track.kind+' track received','color:#22c55e');
    if(call.kind === 'video'){
      document.getElementById('remoteVideo').srcObject = e.streams[0];
    }else{
      document.getElementById('remoteAudio').srcObject = e.streams[0];
    }
  };

  pc.oniceconnectionstatechange = () => {
    console.log('%c[call] ICE state: '+pc.iceConnectionState, 'color:#06b6d4');
  };
  pc.onicegatheringstatechange = () => {
    console.log('[call] ICE gathering:', pc.iceGatheringState);
  };
  pc.onconnectionstatechange = () => {
    console.log('[call] connection state:', pc.connectionState);
    if(pc.connectionState === 'connected'){ onCallConnected(); }
    if(pc.connectionState === 'failed'){
      toast('Call connection failed (network/firewall)');
      endCall(true);
    }
    if(pc.connectionState === 'disconnected' || pc.connectionState === 'closed'){
      if(call.state === 'in-call') endCall(true);
    }
  };
  return pc;
}

// ---- grab mic (and camera for video calls). Asks permission first time. ----
async function getMedia(wantVideo){
  try{
    return await navigator.mediaDevices.getUserMedia({ audio: true, video: !!wantVideo });
  }catch(e){
    console.error('[call] getUserMedia error', e);
    toast(wantVideo ? 'Camera/microphone permission denied' : 'Microphone permission denied');
    return null;
  }
}

// Show our own camera feed in the small self-view (video calls only).
function attachLocalVideo(){
  if(call.kind === 'video' && call.localStream){
    document.getElementById('localVideo').srcObject = call.localStream;
  }
}

// ---- CALLER: click 📞 (kind='audio') or 🎥 (kind='video') ----
async function startCall(kind){
  if(!PEER){ return; }
  if(call.state !== 'idle'){ toast('Already in a call'); return; }
  if(!window.RTCPeerConnection){ toast('This browser has no WebRTC support'); return; }

  call.kind = (kind === 'video') ? 'video' : 'audio';
  call.peerId = PEER.id;
  call.peerName = PEER.name;
  call.state = 'calling';

  const stream = await getMedia(call.kind === 'video');
  if(!stream){ resetCall(); return; }
  call.localStream = stream;
  attachLocalVideo();

  call.pc = makePeerConnection(PEER.id);
  stream.getTracks().forEach(t => call.pc.addTrack(t, stream));

  // Create the SDP offer and hand it to the callee — include the call kind so
  // the callee knows whether to turn its camera on and show the video stage.
  const offer = await call.pc.createOffer();
  await call.pc.setLocalDescription(offer);
  const ok = await sendSignal('offer', PEER.id, { sdp: await packSdp(call.pc.localDescription), kind: call.kind });
  if(!ok){ toast('Could not reach that user'); endCall(false); return; }

  showCallUI('calling');
}

// ---- receive any signaling event on my personal channel ----
async function onCallSignal(data){
  if(!data) return;
  const { type, from_id, from_name, payload } = data;
  console.log('%c[call] I am user #'+(ME&&ME.id)+' — got "'+type+'" from #'+from_id+' (my state: '+call.state+')','color:#f59e0b;font-weight:bold');

  // Safety: ignore a signal that says it came from myself (means both tabs are
  // logged in as the SAME user — the #1 cause of "call rings on both sides").
  if(ME && from_id === ME.id){
    console.warn('[call] ⚠️ signal is from my OWN id — are both devices logged in as the same user?');
    return;
  }

  switch(type){
    case 'offer': {
      // Someone is calling me.
      if(call.state !== 'idle'){
        // I'm busy — tell them, don't disturb my current call.
        sendSignal('busy', from_id, null);
        return;
      }
      call.peerId = from_id;
      call.peerName = from_name || ('User #' + from_id);
      call.kind = (payload.kind === 'video') ? 'video' : 'audio';
      call.state = 'ringing';
      call._incomingOffer = await unpackSdp(payload.sdp);   // stash until I accept
      showCallUI('ringing');
      break;
    }
    case 'answer': {
      // The callee accepted and sent their SDP answer.
      if(call.state !== 'calling' || !call.pc) return;
      await call.pc.setRemoteDescription(await unpackSdp(payload.sdp));
      await drainPendingIce();
      call.state = 'connecting';
      setCallState('Connecting…');
      break;
    }
    case 'ice': {
      if(!call.pc || !payload?.candidate) return;
      const cand = new RTCIceCandidate(payload.candidate);
      // Buffer candidates that arrive before remoteDescription is set.
      if(!call.pc.remoteDescription || !call.pc.remoteDescription.type){
        call.pendingIce.push(cand);
      }else{
        try{ await call.pc.addIceCandidate(cand); }
        catch(e){ console.warn('[call] addIceCandidate failed', e); }
      }
      break;
    }
    case 'decline':
      if(call.state === 'calling'){ toast(call.peerName + ' declined'); endCall(false); }
      break;
    case 'busy':
      if(call.state === 'calling'){ toast(call.peerName + ' is busy'); endCall(false); }
      break;
    case 'end':
      if(call.state !== 'idle'){ endCall(false); }
      break;
  }
}

async function drainPendingIce(){
  if(!call.pc) return;
  for(const c of call.pendingIce){
    try{ await call.pc.addIceCandidate(c); }
    catch(e){ console.warn('[call] drain ice failed', e); }
  }
  call.pendingIce = [];
}

// ---- CALLEE: accept the incoming call ----
async function acceptCall(){
  if(call.state !== 'ringing') return;

  const stream = await getMedia(call.kind === 'video');
  if(!stream){ declineCall(); return; }
  call.localStream = stream;
  attachLocalVideo();

  call.pc = makePeerConnection(call.peerId);
  stream.getTracks().forEach(t => call.pc.addTrack(t, stream));

  // Apply the caller's offer (already an RTCSessionDescription), then answer.
  await call.pc.setRemoteDescription(call._incomingOffer);
  await drainPendingIce();
  const answer = await call.pc.createAnswer();
  await call.pc.setLocalDescription(answer);
  await sendSignal('answer', call.peerId, { sdp: await packSdp(call.pc.localDescription) });

  call.state = 'connecting';
  showCallUI('connecting');
}

// ---- CALLEE: decline ----
function declineCall(){
  if(call.peerId) sendSignal('decline', call.peerId, null);
  endCall(false);
}

// ---- either side hangs up ----
function hangUp(){
  if(call.peerId) sendSignal('end', call.peerId, null);
  endCall(false);
}

// ---- toggle mute on my mic ----
function toggleMute(){
  if(!call.localStream) return;
  call.muted = !call.muted;
  call.localStream.getAudioTracks().forEach(t => t.enabled = !call.muted);
  const btn = document.getElementById('muteBtn');
  if(btn){ btn.classList.toggle('on', call.muted); btn.textContent = call.muted ? '🔇' : '🎙️'; }
}

// ---- toggle my camera (video calls only) ----
function toggleCam(){
  if(!call.localStream) return;
  call.camOff = !call.camOff;
  call.localStream.getVideoTracks().forEach(t => t.enabled = !call.camOff);
  const btn = document.getElementById('camBtn');
  if(btn){ btn.classList.toggle('on', call.camOff); btn.textContent = call.camOff ? '📷' : '🎥'; }
  // dim our self-view when the camera is off
  document.getElementById('localVideo').style.opacity = call.camOff ? '.25' : '1';
}

// ---- tear everything down ----
// notifyPeer=false means the peer already knows (they hung up / we sent 'end').
function endCall(silent){
  if(call.timerId){ clearInterval(call.timerId); call.timerId = null; }
  if(call.pc){ try{ call.pc.close(); }catch{} }
  if(call.localStream){ call.localStream.getTracks().forEach(t => t.stop()); }
  const ra = document.getElementById('remoteAudio'); if(ra) ra.srcObject = null;
  const rv = document.getElementById('remoteVideo'); if(rv) rv.srcObject = null;
  const lv = document.getElementById('localVideo'); if(lv){ lv.srcObject = null; lv.style.opacity='1'; }
  hideCallUI();
  resetCall();
  if(!silent){ /* nothing else — UI already hidden */ }
}
function resetCall(){
  call.state='idle'; call.kind='audio'; call.peerId=null; call.peerName=''; call.pc=null;
  call.localStream=null; call.muted=false; call.camOff=false; call.pendingIce=[];
  call._incomingOffer=null; call.startedAt=0;
}

// ---- called once the media path is live ----
function onCallConnected(){
  if(call.state === 'in-call') return;
  call.state = 'in-call';
  call.startedAt = Date.now();
  showCallUI('in-call');
  call.timerId = setInterval(updateCallTimer, 1000);
}
function updateCallTimer(){
  const secs = Math.floor((Date.now() - call.startedAt)/1000);
  const mm = String(Math.floor(secs/60)).padStart(2,'0');
  const ss = String(secs%60).padStart(2,'0');
  setCallState(mm+':'+ss);
}

// ==========================================================================
//  Call UI rendering
// ==========================================================================
function showCallUI(mode){
  // While a video call is actually live (connecting/in-call) we use the
  // full-screen video stage instead of the little avatar card. The card is
  // still used for ringing/calling on BOTH kinds (before media is flowing).
  const useVideoStage = call.kind === 'video' && (mode === 'connecting' || mode === 'in-call');
  if(useVideoStage){ showVideoStage(mode); hideCard(); return; }

  document.getElementById('videoStage').classList.remove('on');
  const overlay = document.getElementById('callOverlay');
  const card = document.getElementById('callCard');
  overlay.classList.remove('hidden');
  document.getElementById('callAvatar').textContent = initials(call.peerName);
  document.getElementById('callAvatar').style.background = colorFor(call.peerId);
  document.getElementById('callName').textContent = call.peerName;

  const actions = document.getElementById('callActions');
  card.classList.toggle('ringing', mode==='ringing'||mode==='calling');
  const label = call.kind === 'video' ? 'video' : 'voice';

  if(mode==='ringing'){
    setCallState('Incoming '+label+' call…');
    actions.innerHTML =
      `<div class="call-action"><button class="call-round call-decline" onclick="declineCall()">✕</button><div class="call-action-label">Decline</div></div>`+
      `<div class="call-action"><button class="call-round call-accept" onclick="acceptCall()">${call.kind==='video'?'🎥':'📞'}</button><div class="call-action-label">Accept</div></div>`;
  }else if(mode==='calling'){
    setCallState('Calling…');
    actions.innerHTML =
      `<div class="call-action"><button class="call-round call-hangup" onclick="hangUp()">✕</button><div class="call-action-label">Cancel</div></div>`;
  }else if(mode==='connecting'){
    setCallState('Connecting…');
    actions.innerHTML =
      `<div class="call-action"><button class="call-round call-hangup" onclick="hangUp()">✕</button><div class="call-action-label">Hang up</div></div>`;
  }else if(mode==='in-call'){
    setCallState('00:00');
    actions.innerHTML =
      `<div class="call-action"><button class="call-round call-mute" id="muteBtn" onclick="toggleMute()">🎙️</button><div class="call-action-label">Mute</div></div>`+
      `<div class="call-action"><button class="call-round call-hangup" onclick="hangUp()">✕</button><div class="call-action-label">Hang up</div></div>`;
  }
}

// Full-screen video surface (connecting + in-call for video kind).
function showVideoStage(mode){
  document.getElementById('videoStage').classList.add('on');
  document.getElementById('videoName').textContent = call.peerName;
  setCallState(mode === 'in-call' ? '00:00' : 'Connecting…');
  // hide the peer-name hint once we're connected and remote video is showing
  document.getElementById('videoHint').style.display = mode === 'in-call' ? 'none' : 'block';
  document.getElementById('videoControls').innerHTML =
    `<div class="call-action"><button class="call-round call-mute" id="muteBtn" onclick="toggleMute()">🎙️</button><div class="call-action-label">Mute</div></div>`+
    `<div class="call-action"><button class="call-round call-mute" id="camBtn" onclick="toggleCam()">🎥</button><div class="call-action-label">Camera</div></div>`+
    `<div class="call-action"><button class="call-round call-hangup" onclick="hangUp()">✕</button><div class="call-action-label">Hang up</div></div>`;
}

// Write the live state/timer to whichever surface is currently showing.
function setCallState(txt){
  const c = document.getElementById('callState'); if(c) c.textContent = txt;
  const v = document.getElementById('videoState'); if(v) v.textContent = txt;
}
function hideCard(){
  document.getElementById('callOverlay').classList.add('hidden');
  document.getElementById('callCard').classList.remove('ringing');
}
function hideCallUI(){
  hideCard();
  document.getElementById('videoStage').classList.remove('on');
}

// Clean up a live call if the tab is closed.
window.addEventListener('beforeunload', () => { if(call.state!=='idle') hangUp(); });

// ---------- utils ----------
function v(id){return document.getElementById(id).value;}

// ---------- boot ----------
if(TOKEN && ME){ enterApp(); }
</script>
